<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ title }} - TruthLens Intelligence</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; background: #fafbfc; color: #111827; margin: 0; padding: 40px 20px; line-height: 1.6; }
    .container { max-width: 800px; margin: 0 auto; background: white; padding: 60px 50px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); border: 1px solid #e5e7eb; text-align: center; }
    .icon { font-size: 3rem; margin-bottom: 20px; }
    h1 { font-size: 2rem; color: #1e293b; margin-bottom: 16px; font-weight: 800; letter-spacing: -0.02em; }
    p { margin-bottom: 32px; color: #4b5563; font-size: 1.1rem; }
    .back { display: inline-block; text-decoration: none; color: white; background: #3b82f6; font-weight: 600; padding: 12px 24px; border-radius: 8px; transition: 0.2s; }
    .back:hover { background: #2563eb; transform: translateY(-2px); box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3); }
  </style>
    <!-- Tailwind CSS Setup -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        corePlugins: {
          preflight: false
        }
      }
    </script>
</head>
<body>
  <div class="container">
    <h1>{{ title }}</h1>
    <p>This premium SaaS feature is currently under active development and will be available in the very next iteration of the TruthLens platform!</p>
    <a href="/" class="back">Return to Dashboard</a>
  </div>
</body>
</html>
