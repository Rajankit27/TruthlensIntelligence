services:
  - type: web
    name: truthlens-intelligence-live
    env: python
    rootDirectory: TruthLens-AI
    buildCommand: "pip install -r requirements.txt && python ml/train_model.py"
    startCommand: "gunicorn backend.app:app --bind 0.0.0.0:$PORT"
    envVars:
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.11.0
